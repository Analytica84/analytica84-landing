<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytica84 — Verify Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(0,255,255,0.03);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 16px;
            padding: 48px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #fff;
        }
        .subtitle {
            color: #8a8a9a;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #00ffff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #000000;
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ffff, #00a884);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,255,255,0.4);
        }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: rgba(0,255,0,0.1);
            border: 1px solid rgba(0,255,0,0.3);
            color: #00ff00;
            display: block;
        }
        .status.error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff4444;
            display: block;
        }
        .step {
            display: inline-block;
            background: rgba(0,255,255,0.1);
            color: #00ffff;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="step">STEP 2 OF 2</span>
        <img src="a84-bolt-logo.jpg" alt="Analytica84" class="logo">
        <h1>Verify Your Wallet</h1>
        <p class="subtitle">Enter the wallet address you used to sign up on Hyperliquid. We'll verify it and unlock your dashboard.</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
            <label>Hyperliquid Wallet Address</label>
            <input type="text" id="wallet" placeholder="0x..." required>
        </div>
        <button class="submit-btn" onclick="submitWallet()">Submit for Verification →</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const BOT_URL = 'https://web-production-b19ed.up.railway.app';
        
        async function submitWallet() {
            const email = document.getElementById('email').value;
            const wallet = document.getElementById('wallet').value;
            const status = document.getElementById('status');
            
            if (!email || !wallet) {
                status.className = 'status error';
                status.innerText = 'Please fill in both fields';
                return;
            }
            
            try {
                const res = await fetch(BOT_URL + '/api/verify-wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, wallet })
                });
                const data = await res.json();
                
                if (data.status === 'wallet_saved') {
                    status.className = 'status success';
                    status.innerText = 'Wallet submitted! Waiting for approval. Check your email soon.';
                } else {
                    status.className = 'status error';
                    status.innerText = 'Error: ' + (data.error || 'Unknown error');
                }
            } catch (e) {
                status.className = 'status error';
                status.innerText = 'Connection error. Please try again.';
            }
        }
    </script>
</body>
</html>
