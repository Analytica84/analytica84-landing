<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALYTICA84 - Powered by Crayons Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; min-height: 100vh; }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid rgba(0,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            margin: -30px -30px 0 -30px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .nav-logo img {
            max-width: 180px;
            height: auto;
            display: block;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding: 0.25rem 0;
            transition: all 0.3s ease;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00ffff;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00ffff;
        }
        .nav-links a:hover {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active {
            color: #00ffff;
        }
        .nav-links a.active::after { width: 100%; }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }
        .hamburger span {
            width: 25px;
            height: 2px;
            background: #00ffff;
            transition: all 0.3s ease;
        }
        .lang-toggle {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 0.3rem 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .lang-btn:hover, .lang-btn.active {
            background: #00ffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }

        .header { margin-bottom: 30px; background: #000000; }
        .asset-selector { position: relative; display: inline-block; }
        .asset-dropdown { background: #000000 !important; color: #00ffff !important; border: 2px solid #00ffff !important; padding: 12px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,255,0.3); -webkit-appearance: none; -moz-appearance: none; appearance: none; outline: none; text-align: center; }
        .asset-dropdown option { background: #000000 !important; color: #00ffff !important; }
        .asset-dropdown optgroup { background: #000000 !important; color: #00ffff !important; font-weight: bold; }
        .status { font-size: 12px; text-align: center; margin: 10px 0; color: #ffffff; }
        .status.connected { color: #00ff00; }
        .status.error { color: #ff0000; }
        .timeframe-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .tf-card { background: #000000; border: 2px solid #00ffff; border-radius: 12px; padding: 20px; box-shadow: 0 0 20px rgba(0,255,255,0.2); transition: transform 0.3s ease; }
        .tf-card:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(0,255,255,0.4); }
        .tf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .tf-label { font-size: 12pt; font-weight: 900; color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.5); flex-shrink: 0; }
        .tf-price { font-size: 14px; color: #00ff00; font-weight: bold; }
        .tf-a84 { font-size: 12px; color: #ff1493; font-weight: 600; }
        .chart-container { position: relative; width: 100%; height: 200px; background: #000000; border-radius: 8px; overflow: hidden; border: 1px solid rgba(0,255,255,0.3); }
        .chart-container canvas { width: 100%; height: 100%; }
        .legend { display: flex; justify-content: center; gap: 30px; margin-top: 30px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 8px; color: #ffffff; }
        .legend-line { width: 30px; height: 3px; border-radius: 2px; }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(0,255,255,0.08);
            color: #ffffff;
            font-size: 0.85rem;
            margin-top: 40px;
        }
        .footer span { color: #00ffff; }

        @media(max-width: 768px) {
            .navbar { padding: 1rem; margin: -30px -30px 0 -30px; }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: rgba(0,0,0,0.98);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                transition: right 0.3s ease;
                border-left: 1px solid rgba(0,255,255,0.1);
            }
            .nav-links.active { right: 0; }
            .hamburger { display: flex; }
            body { padding: 15px; }
            .navbar { margin: -15px -15px 0 -15px; }
            .timeframe-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width: 480px) {
            .timeframe-grid { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo"><img src="a84-bolt-logo.jpg" alt="ANALYTICA84"></a>

        <ul class="nav-links" id="navLinks">
            <li><a href="community.html" data-en="Community" data-es="Comunidad">Community</a></li>
            <li><a href="learn.html" data-en="Learn" data-es="Aprender">Learn</a></li>
            <li><a href="dashboard.html" class="active" data-en="Dashboard" data-es="Panel">Dashboard</a></li>
        </ul>

        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
            <button class="lang-btn" onclick="setLang('es')" id="btn-es">ES</button>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="header" style="text-align:center;padding:20px;">
        <div id="status" class="status">Connecting to Hyperliquid...</div>
        <div class="asset-selector" style="margin-top:8px;">
            <select class="asset-dropdown" id="assetDropdown">
                <optgroup label="Crypto">
                    <option value="BTC">🚀 BTC/USD</option>
                    <option value="SOL">💎 SOL/USD</option>
                    <option value="XRP">⚡ XRP/USD</option>
                    <option value="XLM">⭐ XLM/USD</option>
                </optgroup>
                <optgroup label="TradFi">
                    <option value="xyz:SP500">📈 S&amp;P500</option>
                    <option value="xyz:GOLD">🥇 GOLD</option>
                    <option value="xyz:EUR">💶 EUR/USD</option>
                    <option value="xyz:CL">🛢️ WTI Oil</option>
                </optgroup>
            </select>
        </div>
    </div>

    <div class="timeframe-grid">
        <div class="tf-card"><div class="tf-header"><span class="tf-label">4h</span><span class="tf-price" id="price-4h">$0.00</span><span class="tf-a84" id="a84-4h">A84: --</span></div><div class="chart-container"><canvas id="chart-4h"></canvas></div></div>
        <div class="tf-card"><div class="tf-header"><span class="tf-label">1h</span><span class="tf-price" id="price-1h">$0.00</span><span class="tf-a84" id="a84-1h">A84: --</span></div><div class="chart-container"><canvas id="chart-1h"></canvas></div></div>
        <div class="tf-card"><div class="tf-header"><span class="tf-label">15m</span><span class="tf-price" id="price-15m">$0.00</span><span class="tf-a84" id="a84-15m">A84: --</span></div><div class="chart-container"><canvas id="chart-15m"></canvas></div></div>
        <div class="tf-card"><div class="tf-header"><span class="tf-label">5m</span><span class="tf-price" id="price-5m">$0.00</span><span class="tf-a84" id="a84-5m">A84: --</span></div><div class="chart-container"><canvas id="chart-5m"></canvas></div></div>
        <div class="tf-card"><div class="tf-header"><span class="tf-label">1m</span><span class="tf-price" id="price-1m">$0.00</span><span class="tf-a84" id="a84-1m">A84: --</span></div><div class="chart-container"><canvas id="chart-1m"></canvas></div></div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-line" style="background:#00ffff;box-shadow:0 0 5px #00ffff;"></div><span data-en="Price Line" data-es="Línea de Precio">Price Line</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#ff1493;box-shadow:0 0 5px #ff1493;"></div><span style="color:#ff1493;" data-en="A84 Price Target" data-es="Objetivo de Precio A84">A84 Price Target</span></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 <span>ANALYTICA84</span> — <span data-en="Powered by Crayons Engine" data-es="Impulsado por Crayons Engine">Powered by Crayons Engine</span></p>
    </footer>

    <script>
        const TIMEFRAMES = ['4h','1h','15m','5m','1m'];
        const HL_INTERVALS = { '1m':'1m', '5m':'5m', '15m':'15m', '1h':'1h', '4h':'4h' };
        let currentAsset = 'BTC';
        let ws;
        let canvasData = {};
        let tfState = {};
        let livePrice = 0;
        let xyzPollInterval = null;
        let xyzLivePrice = 0;

        function getDex(asset) {
            return asset.startsWith('xyz:') ? 'xyz' : '';
        }

        function getDecimals(asset, value) {
            if (asset === 'xyz:EUR') return 4;
            const absVal = Math.abs(value);
            if (absVal >= 1) return 2;
            if (absVal >= 0.01) return 4;
            return 6;
        }

        function formatPrice(asset, value) {
            const decimals = getDecimals(asset, value);
            return '$' + value.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function drawChart(canvasId, prices, a84targets) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const W = canvas.width, H = canvas.height;
            const axisWidth = 55;
            const chartW = W - axisWidth - 10;
            ctx.clearRect(0, 0, W, H);
            if (prices.length < 2) return;

            const allVals = [...prices, ...a84targets];
            const minV = Math.min(...allVals);
            const maxV = Math.max(...allVals);
            const range = maxV - minV || 1;

            function toX(i, len) { return (i / (len - 1)) * chartW; }
            function toY(v) { return H - ((v - minV) / range) * H * 0.85 - H * 0.05; }

            ctx.font = '10px "Segoe UI", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            const ticks = 5;
            for (let t = 0; t < ticks; t++) {
                const frac = t / (ticks - 1);
                const val = minV + (1 - frac) * range;
                const y = H * 0.05 + frac * H * 0.85;
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0,255,255,0.08)';
                ctx.lineWidth = 1;
                ctx.moveTo(0, y);
                ctx.lineTo(chartW, y);
                ctx.stroke();
                const label = formatPrice(currentAsset, val);
                ctx.fillText(label, chartW + 8, y + 3);
            }

            ctx.beginPath();
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 6;
            prices.forEach((v, i) => { i === 0 ? ctx.moveTo(toX(i, prices.length), toY(v)) : ctx.lineTo(toX(i, prices.length), toY(v)); });
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = '#ff1493';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ff1493';
            ctx.shadowBlur = 6;
            a84targets.forEach((v, i) => { i === 0 ? ctx.moveTo(toX(i, a84targets.length), toY(v)) : ctx.lineTo(toX(i, a84targets.length), toY(v)); });
            ctx.stroke();
        }

        function calcA84Target(candles) {
            let obv = 0;
            const obvArr = [];
            for (let i = 0; i < candles.length; i++) {
                if (i === 0) { obvArr.push(0); continue; }
                const close = candles[i][4];
                const prevClose = candles[i-1][4];
                const vol = candles[i][5];
                if (close > prevClose) obv += vol;
                else if (close < prevClose) obv -= vol;
                obvArr.push(obv);
            }
            const prices = candles.map(c => c[4]);
            const minP = Math.min(...prices), maxP = Math.max(...prices);
            const minO = Math.min(...obvArr), maxO = Math.max(...obvArr);
            const rangeO = maxO - minO || 1;
            return obvArr.map(o => minP + ((o - minO) / rangeO) * (maxP - minP));
        }

        async function initCandles(asset, interval, tfId) {
            try {
                const endTime = Date.now();
                const startMap = { '1m': 4*60*60*1000, '5m': 12*60*60*1000, '15m': 3*24*60*60*1000, '1h': 5*24*60*60*1000, '4h': 10*24*60*60*1000 };
                const startTime = endTime - startMap[interval];

                const res = await fetch('https://api.hyperliquid.xyz/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'candleSnapshot', req: { coin: asset, interval: interval, startTime: startTime, endTime: endTime }, dex: getDex(asset) })
                });
                const candles = await res.json();
                if (!candles || candles.length < 2) return;

                const rawCandles = candles.map(c => [0,0,0,0, parseFloat(c.c), parseFloat(c.v)]);
                const lastCandle = rawCandles[rawCandles.length - 1];

                const a84 = calcA84Target(rawCandles);
                const prices = rawCandles.map(c => c[4]);

                tfState[tfId] = {
                    candles: rawCandles,
                    obv: a84[a84.length - 1],
                    lastClose: lastCandle[4],
                    lastTime: candles[candles.length - 1].t
                };

                canvasData[tfId] = { prices, a84 };
                drawChart('chart-' + tfId, prices, a84);
                updateA84Label(tfId, a84[a84.length - 1]);
            } catch(e) {
                console.log('Init candle error:', interval, e);
            }
        }

        async function updateCandles(asset, interval, tfId) {
            try {
                const state = tfState[tfId];
                if (!state) return;

                const lastTime = state.lastTime;
                const endTime = Date.now();

                const res = await fetch('https://api.hyperliquid.xyz/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'candleSnapshot', req: { coin: asset, interval: interval, startTime: lastTime, endTime: endTime }, dex: getDex(asset) })
                });
                const newCandles = await res.json();
                if (!newCandles || newCandles.length < 2) return;

                const toAdd = newCandles.slice(1);
                if (toAdd.length === 0) return;

                const rawToAdd = toAdd.map(c => [0,0,0,0, parseFloat(c.c), parseFloat(c.v)]);
                state.candles = state.candles.concat(rawToAdd);

                const a84 = calcA84Target(state.candles);
                const prices = state.candles.map(c => c[4]);

                const lastCandle = rawToAdd[rawToAdd.length - 1];
                state.obv = a84[a84.length - 1];
                state.lastClose = lastCandle[4];
                state.lastTime = toAdd[toAdd.length - 1].t;

                if (state.candles.length > 500) {
                    state.candles = state.candles.slice(-500);
                }

                canvasData[tfId] = { prices, a84 };
                drawChart('chart-' + tfId, prices, a84);
                updateA84Label(tfId, a84[a84.length - 1]);
            } catch(e) {
                console.log('Update candle error:', interval, e);
            }
        }

        function updateA84Label(tfId, value) {
            const a84El = document.getElementById('a84-' + tfId);
            if (a84El) {
                a84El.innerText = 'A84: ' + formatPrice(currentAsset, value);
            }
        }

        function loadAllCharts(asset) {
            TIMEFRAMES.forEach(tf => initCandles(asset, HL_INTERVALS[tf], tf));
        }

        function startXyzPolling(asset) {
            if (xyzPollInterval) clearInterval(xyzPollInterval);

            async function pollXyz() {
                try {
                    const res = await fetch('https://api.hyperliquid.xyz/info', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'allMids', dex: 'xyz' })
                    });
                    const mids = await res.json();
                    const price = mids[asset];
                    if (price) {
                        xyzLivePrice = parseFloat(price);
                        const formatted = formatPrice(currentAsset, xyzLivePrice);
                        TIMEFRAMES.forEach(tf => { document.getElementById('price-' + tf).innerText = formatted; });
                    }
                } catch(e) {
                    console.log('XYZ poll error:', e);
                }
            }

            pollXyz();
            xyzPollInterval = setInterval(pollXyz, 10000);
        }

        function stopXyzPolling() {
            if (xyzPollInterval) {
                clearInterval(xyzPollInterval);
                xyzPollInterval = null;
            }
        }

        function connect() {
            ws = new WebSocket('wss://api.hyperliquid.xyz/ws');

            ws.onopen = () => {
                document.getElementById('status').innerText = '● LIVE — Hyperliquid Connected';
                document.getElementById('status').className = 'status connected';
                ws.send(JSON.stringify({ method: 'subscribe', subscription: { type: 'allMids' } }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.channel === 'allMids' && msg.data && msg.data.mids) {
                    const price = msg.data.mids[currentAsset];
                    if (price) {
                        livePrice = parseFloat(price);
                        const formatted = formatPrice(currentAsset, livePrice);
                        TIMEFRAMES.forEach(tf => { document.getElementById('price-' + tf).innerText = formatted; });
                    }
                }
            };

            ws.onerror = () => {
                document.getElementById('status').innerText = '● ERROR — Check connection';
                document.getElementById('status').className = 'status error';
            };

            ws.onclose = () => {
                document.getElementById('status').innerText = '● Reconnecting...';
                document.getElementById('status').className = 'status';
                setTimeout(connect, 3000);
            };
        }

        document.getElementById('assetDropdown').addEventListener('change', (e) => {
            currentAsset = e.target.value;
            tfState = {};
            livePrice = 0;
            xyzLivePrice = 0;

            if (currentAsset.startsWith('xyz:')) {
                stopXyzPolling();
                startXyzPolling(currentAsset);
            } else {
                stopXyzPolling();
            }

            loadAllCharts(currentAsset);
        });

        connect();
        loadAllCharts(currentAsset);
        setInterval(() => {
            TIMEFRAMES.forEach(tf => updateCandles(currentAsset, HL_INTERVALS[tf], tf));
        }, 60000);

        // --- LANGUAGE TOGGLE ---
        function setLang(lang) {
            document.documentElement.lang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.querySelectorAll('[data-en][data-es]').forEach(el => {
                const html = el.getAttribute('data-' + lang);
                if (html) el.innerHTML = html;
            });
            localStorage.setItem('a84-lang', lang);
        }
        const savedLang = localStorage.getItem('a84-lang') || 'en';
        if (savedLang !== 'en') setLang(savedLang);

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('active');
            });
        });
    </script>

</body>
